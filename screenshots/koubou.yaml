# Koubou screenshot config for VaxNear
# App Store screenshot compositions for vaccination finder / nearby pharmacies

screenshots:
  - name: nearby-pharmacies
    output_size: "iPhone6_9"
    background:
      gradient:
        colors: ["#1565C0", "#42A5F5"]
        direction: "top_to_bottom"
    device:
      type: "iPhone 15 Pro Portrait"
      screenshot: "raw/01-nearby-pharmacies.png"
      position: "bottom-center"
      offset_y: 180
    text:
      headline: "Find Vaccines Nearby"
      subtitle: "Locate pharmacies and clinics in seconds"
      color: "#FFFFFF"
      position: "top-center"
      offset_y: 120

